<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c9a84c; --dark:#1a1a2e; --cream:#f5f0e8; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'EB Garamond',serif; background:var(--dark); color:var(--cream); min-height:100vh; display:flex; flex-direction:column; }

  /* SETUP */
  #setup-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; background:radial-gradient(ellipse at top,#2a2040 0%,var(--dark) 70%); }
  #setup-screen h1 { font-family:'Playfair Display',serif; font-size:2.4rem; color:var(--gold); margin-bottom:8px; letter-spacing:0.05em; }
  .subtitle { color:#a09080; font-style:italic; margin-bottom:40px; font-size:1.1rem; }
  .setup-card { background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:12px; padding:32px; width:100%; max-width:620px; }
  #segments-list { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .segment-row { display:grid; grid-template-columns:1fr 80px 80px 36px; gap:8px; align-items:center; }
  .segment-row input { background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.25); border-radius:6px; padding:8px 12px; color:var(--cream); font-family:'EB Garamond',serif; font-size:1rem; outline:none; transition:border-color 0.2s; }
  .segment-row input:focus { border-color:var(--gold); }
  .segment-row input[type="number"] { text-align:center; }
  .col-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:#706050; text-align:center; }
  .col-label:first-child { text-align:left; }
  .btn-remove { background:none; border:1px solid rgba(192,57,43,0.3); color:#c0392b; border-radius:6px; width:36px; height:36px; cursor:pointer; font-size:1.1rem; transition:background 0.2s; }
  .btn-remove:hover { background:rgba(192,57,43,0.15); }
  .btn-add { background:none; border:1px dashed rgba(201,168,76,0.35); color:var(--gold); border-radius:6px; padding:8px; cursor:pointer; font-family:'EB Garamond',serif; font-size:1rem; width:100%; transition:background 0.2s; margin-bottom:24px; }
  .btn-add:hover { background:rgba(201,168,76,0.08); }
  .btn-start { background:linear-gradient(135deg,#c9a84c,#a07830); color:var(--dark); border:none; border-radius:8px; padding:14px 48px; font-family:'Playfair Display',serif; font-size:1.2rem; cursor:pointer; width:100%; letter-spacing:0.05em; transition:opacity 0.2s,transform 0.1s; }
  .btn-start:hover { opacity:0.9; transform:translateY(-1px); }

  /* CONTROL SCREEN */
  #timer-screen { display:none; flex-direction:column; min-height:100vh; }
  .timer-header { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid rgba(201,168,76,0.15); background:rgba(0,0,0,0.35); }
  .timer-header h2 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.05rem; letter-spacing:0.08em; }
  .header-actions { display:flex; gap:10px; }
  .btn-hdr { background:none; border:1px solid rgba(201,168,76,0.3); color:var(--gold); padding:6px 16px; border-radius:6px; cursor:pointer; font-family:'EB Garamond',serif; font-size:0.95rem; transition:background 0.2s; }
  .btn-hdr:hover { background:rgba(201,168,76,0.1); }
  .btn-present { background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.08)); border:1px solid rgba(201,168,76,0.55) !important; font-weight:600; }

  .ctrl-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 20px; position:relative; background:radial-gradient(ellipse at center,#1e1830 0%,var(--dark) 80%); transition:background 0.5s; }
  .ctrl-body.overtime { background:radial-gradient(ellipse at center,#2a0806 0%,#150202 80%); }
  .ctrl-seg-name { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--cream); margin-bottom:6px; text-align:center; }
  .ctrl-seg-pos { font-size:0.78rem; color:#706050; text-transform:uppercase; letter-spacing:0.15em; margin-bottom:28px; }
  .ctrl-time { font-family:'Playfair Display',serif; font-size:6rem; font-weight:700; line-height:1; letter-spacing:-0.02em; color:var(--gold); text-shadow:0 0 40px rgba(201,168,76,0.25); transition:color 0.3s; }
  .ctrl-time.overtime { color:#ff4444; animation:pulse-ctrl 1s infinite; }
  @keyframes pulse-ctrl { 0%,100%{text-shadow:0 0 30px rgba(255,68,68,0.4);}50%{text-shadow:0 0 70px rgba(255,68,68,0.85);} }
  .over-badge { margin-top:10px; font-size:2rem; font-family:'Playfair Display',serif; font-weight:700; text-transform:uppercase; letter-spacing:0.15em; color:#ff6666; opacity:0; transition:opacity 0.3s; }
  .over-badge.show { opacity:1; }
  .controls { display:flex; gap:12px; margin-top:36px; align-items:center; }
  .btn-c { border-radius:8px; cursor:pointer; font-family:'EB Garamond',serif; font-size:1rem; padding:11px 28px; transition:all 0.2s; }
  .bp { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.18); color:var(--cream); }
  .bp:hover { background:rgba(255,255,255,0.13); }
  .bn { background:linear-gradient(135deg,#c9a84c,#a07830); border:none; color:var(--dark); font-weight:600; letter-spacing:0.05em; }
  .bn:hover { opacity:0.9; transform:translateY(-1px); }
  .br { background:none; border:1px solid rgba(201,168,76,0.22); color:#a08050; padding:11px 16px; }
  .br:hover { background:rgba(201,168,76,0.08); }
  .kbd-hint { position:absolute; bottom:14px; right:20px; display:flex; gap:14px; opacity:0.35; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; }
  .key { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18); border-radius:4px; padding:2px 7px; font-size:0.78rem; }
  .prog-wrap { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,0.05); }
  .prog-bar { height:100%; background:linear-gradient(90deg,var(--gold),#e8c870); transition:width 1s linear, background 0.3s; }
  .prog-bar.over { background:linear-gradient(90deg,#c0392b,#ff6666); width:100%!important; }
  .segments-sidebar { display:flex; gap:8px; padding:14px 28px; background:rgba(0,0,0,0.2); border-top:1px solid rgba(201,168,76,0.1); overflow-x:auto; flex-wrap:wrap; justify-content:center; }
  .seg-chip { padding:5px 13px; border-radius:20px; font-size:0.78rem; border:1px solid rgba(255,255,255,0.1); color:#706050; white-space:nowrap; transition:all 0.3s; }
  .seg-chip.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.1); }
  .seg-chip.done { color:#383838; border-color:rgba(255,255,255,0.04); text-decoration:line-through; }
  .done-msg { display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:16px; text-align:center; }
  .done-msg h2 { font-family:'Playfair Display',serif; font-size:2.2rem; color:var(--gold); }
  .done-msg p { color:#a09080; font-style:italic; font-size:1.05rem; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <h1>✦ Service Timer</h1>
  <p class="subtitle">Prepare your order of service below</p>
  <div class="setup-card">
    <div style="display:grid;grid-template-columns:1fr 80px 80px 36px;gap:8px;margin-bottom:6px;padding:0 2px">
      <span class="col-label">Segment Name</span><span class="col-label">Min</span><span class="col-label">Sec</span><span class="col-label"></span>
    </div>
    <div id="segments-list"></div>
    <button class="btn-add" onclick="addSegment()">+ Add Segment</button>
    <button class="btn-start" onclick="startService()">Begin Service</button>
  </div>
</div>

<!-- CONTROL -->
<div id="timer-screen">
  <div class="timer-header">
    <h2>✦ Service Timer — Control</h2>
    <div class="header-actions">
      <button class="btn-hdr btn-present" id="btn-present" onclick="openPresenter()">⛶ Open Presentation Screen</button>
      <button class="btn-hdr" onclick="goToSetup()">← Edit Segments</button>
    </div>
  </div>

  <div class="ctrl-body" id="ctrl-body">
    <div class="ctrl-seg-name" id="ctrl-seg-name">—</div>
    <div class="ctrl-seg-pos" id="ctrl-seg-pos"></div>
    <div class="ctrl-time" id="ctrl-time">00:00</div>
    <div class="over-badge" id="over-badge">⚠ Over Time</div>
    <div class="controls">
      <button class="btn-c br" onclick="resetCurrent()">↺ Reset</button>
      <button class="btn-c bp" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
      <button class="btn-c bn" onclick="nextSegment()">Next →</button>
    </div>
    <div class="kbd-hint">
      <span><span class="key">Space</span> Pause</span>
      <span><span class="key">→</span> Next</span>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  </div>

  <div class="done-msg" id="done-msg">
    <h2>🕊 Service Complete</h2>
    <p>All segments have been completed.</p>
    <button class="btn-start" style="max-width:240px;margin-top:16px" onclick="goToSetup()">Start Over</button>
  </div>

  <div class="segments-sidebar" id="segments-sidebar"></div>
</div>

<script>
let segments=[], currentIndex=0, totalSeconds=0, isPaused=false, timer=null, presenterWin=null;
let startTime=null, pausedAt=null, totalPausedMs=0;

function addSegment(name='',mins=5,secs=0){
  const row=document.createElement('div'); row.className='segment-row';
  row.innerHTML=`<input type="text" placeholder="e.g. Welcome / Worship / Sermon" value="${name}"><input type="number" min="0" max="120" value="${mins}"><input type="number" min="0" max="59" value="${secs}"><button class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('segments-list').appendChild(row);
}
addSegment('Welcome & Announcements',5,0);
addSegment('Worship',20,0);
addSegment('Offering',5,0);
addSegment('Sermon',35,0);
addSegment('Altar Call / Prayer',10,0);
addSegment('Closing',5,0);

function startService(){
  segments=[];
  document.querySelectorAll('.segment-row').forEach(row=>{
    const i=row.querySelectorAll('input');
    const total=(parseInt(i[1].value)||0)*60+(parseInt(i[2].value)||0);
    if(total>0) segments.push({name:i[0].value.trim()||'Untitled',total});
  });
  if(!segments.length) return alert('Please add at least one segment.');
  currentIndex=0;
  document.getElementById('setup-screen').style.display='none';
  const ts=document.getElementById('timer-screen'); ts.style.display='flex'; ts.style.flexDirection='column';
  buildSidebar(); loadSegment(0);
}

/* ── Presenter ── */
function getPresenterHTML(){
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Service Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'EB Garamond',serif;background:#0d0b18;color:#f5f0e8;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:background 0.5s}
body.ot{animation:fbody 1s infinite}
@keyframes fbody{0%,100%{background:#180303}50%{background:#2c0505}}
.label{font-size:1.3vw;text-transform:uppercase;letter-spacing:0.25em;color:rgba(201,168,76,0.4);margin-bottom:1.5vh}
.name{font-family:'Playfair Display',serif;font-size:5.5vw;font-weight:700;color:#f5f0e8;margin-bottom:4vh;text-align:center;line-height:1.1;text-shadow:0 2px 30px rgba(0,0,0,0.5)}
.time{font-family:'Playfair Display',serif;font-size:22vw;font-weight:700;line-height:1;letter-spacing:-0.02em;color:#c9a84c;text-shadow:0 0 80px rgba(201,168,76,0.2);transition:color 0.4s}
.time.ot{color:#ff2222;animation:pt 1s infinite}
@keyframes pt{0%,100%{text-shadow:0 0 60px rgba(255,34,34,0.5)}50%{text-shadow:0 0 140px rgba(255,34,34,1)}}
.overtag{margin-top:2vh;font-size:3.5vw;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;color:#ff5555;opacity:0;transition:opacity 0.3s}
.overtag.show{opacity:1}
.pw{position:absolute;bottom:0;left:0;right:0;height:6px;background:rgba(255,255,255,0.04)}
.pb{height:100%;background:linear-gradient(90deg,#c9a84c,#f0d880);transition:width 1s linear}
.pb.ot{background:linear-gradient(90deg,#c0392b,#ff6666);width:100%!important}
.chips{position:absolute;bottom:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 20px}
.chip{font-size:0.85vw;padding:3px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.2)}
.chip.a{border-color:rgba(201,168,76,0.55);color:rgba(201,168,76,0.75)}
.chip.d{color:rgba(255,255,255,0.08);text-decoration:line-through}
</style></head>
<body id="pb">
<div class="label" id="pp"></div>
<div class="name" id="pn">Loading…</div>
<div class="time" id="pt">00:00</div>
<div class="overtag" id="po">⚠ Over Time</div>
<div class="pw"><div class="pb" id="pbar"></div></div>
<div class="chips" id="pchips"></div>
<script>
window.updatePresenter=function(s){
  document.getElementById('pt').textContent=s.time;
  document.getElementById('pt').className='time'+(s.ot?' ot':'');
  document.getElementById('pn').textContent=s.name;
  document.getElementById('pp').textContent=s.pos;
  document.getElementById('po').className='overtag'+(s.ot?' show':'');
  document.getElementById('pb').className=s.ot?'ot':'';
  const b=document.getElementById('pbar');
  b.className='pb'+(s.ot?' ot':'');
  if(!s.ot) b.style.width=s.pct+'%';
  const cl=document.getElementById('pchips');
  if(s.chips.length!==cl.children.length){
    cl.innerHTML='';
    s.chips.forEach((c,i)=>{const d=document.createElement('div');d.className='chip';d.id='c'+i;d.textContent=c;cl.appendChild(d);});
  }
  s.chips.forEach((_,i)=>{const e=document.getElementById('c'+i);if(!e)return;e.className='chip'+(i<s.idx?' d':i===s.idx?' a':'');});
};
<\/script></body></html>`;
}

function openPresenter(){
  presenterWin=window.open('','ServicePresenter','width=1280,height=720');
  presenterWin.document.open();
  presenterWin.document.write(getPresenterHTML());
  presenterWin.document.close();
  // button text stays unchanged
  setTimeout(pushToPresenter,700);
}

function pushToPresenter(){
  if(!presenterWin||presenterWin.closed||!presenterWin.updatePresenter) return;
  const elapsed=getElapsed(), rem=totalSeconds-elapsed, isOver=rem<0;
  presenterWin.updatePresenter({
    time:fmtTime(isOver?Math.abs(rem):rem),
    name:segments[currentIndex]?segments[currentIndex].name:'—',
    pos:`Segment ${currentIndex+1} of ${segments.length}`,
    ot:isOver, pct:Math.max(0,(rem/totalSeconds)*100),
    idx:currentIndex, chips:segments.map(s=>s.name)
  });
}

/* ── Timer ── */
function buildSidebar(){
  const sb=document.getElementById('segments-sidebar'); sb.innerHTML='';
  segments.forEach((s,i)=>{
    const c=document.createElement('div'); c.className='seg-chip'; c.id='chip-'+i;
    c.textContent=`${s.name} (${fmtTime(s.total)})`; sb.appendChild(c);
  });
}

function loadSegment(index){
  clearInterval(timer); currentIndex=index; isPaused=false;
  startTime=Date.now(); totalPausedMs=0; pausedAt=null;
  document.getElementById('btn-pause').textContent='⏸ Pause';
  const seg=segments[index]; totalSeconds=seg.total;
  document.getElementById('ctrl-seg-name').textContent=seg.name;
  document.getElementById('ctrl-seg-pos').textContent=`Segment ${index+1} of ${segments.length}`;
  document.getElementById('ctrl-body').style.display='';
  document.getElementById('done-msg').style.display='none';
  updateDisplay(); updateSidebar();
  timer=setInterval(tick,250);
}

function getElapsed(){
  if(!startTime) return 0;
  const pauseOffset = pausedAt ? (Date.now()-pausedAt) : 0;
  return Math.floor((Date.now()-startTime-totalPausedMs-pauseOffset)/1000);
}

function tick(){ if(isPaused)return; updateDisplay(); pushToPresenter(); }

function updateDisplay(){
  const elapsed=getElapsed(), rem=totalSeconds-elapsed, isOver=rem<0, dt=isOver?Math.abs(rem):rem;
  document.getElementById('ctrl-time').textContent=fmtTime(dt);
  document.getElementById('ctrl-time').className='ctrl-time'+(isOver?' overtime':'');
  document.getElementById('ctrl-body').className='ctrl-body'+(isOver?' overtime':'');
  document.getElementById('over-badge').className='over-badge'+(isOver?' show':'');
  const bar=document.getElementById('prog-bar');
  if(isOver){bar.className='prog-bar over';}
  else{bar.className='prog-bar'; bar.style.width=Math.max(0,(rem/totalSeconds)*100)+'%';}
}

function fmtTime(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function togglePause(){
  isPaused=!isPaused;
  if(isPaused){ pausedAt=Date.now(); }
  else { totalPausedMs+=Date.now()-pausedAt; pausedAt=null; }
  document.getElementById('btn-pause').textContent=isPaused?'▶ Resume':'⏸ Pause';
}
function resetCurrent(){ startTime=Date.now(); totalPausedMs=0; pausedAt=null; isPaused=false; document.getElementById('btn-pause').textContent='⏸ Pause'; updateDisplay(); pushToPresenter(); }

function nextSegment(){
  const chip=document.getElementById(`chip-${currentIndex}`); if(chip) chip.className='seg-chip done';
  clearInterval(timer);
  if(currentIndex+1>=segments.length){
    document.getElementById('ctrl-body').style.display='none';
    document.getElementById('done-msg').style.display='flex';
    document.getElementById('done-msg').style.flexDirection='column';
    if(presenterWin&&!presenterWin.closed&&presenterWin.updatePresenter)
      presenterWin.updatePresenter({time:'✦',name:'Service Complete',pos:'',ot:false,pct:0,idx:999,chips:[]});
    return;
  }
  loadSegment(currentIndex+1); pushToPresenter();
}

function updateSidebar(){
  segments.forEach((_,i)=>{
    const c=document.getElementById('chip-'+i); if(!c)return;
    c.className='seg-chip'+(i<currentIndex?' done':i===currentIndex?' active':'');
  });
}

function goToSetup(){ clearInterval(timer); document.getElementById('timer-screen').style.display='none'; document.getElementById('setup-screen').style.display='flex'; }

document.addEventListener('keydown',e=>{
  if(document.getElementById('timer-screen').style.display==='none')return;
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePause();pushToPresenter();}
  else if(e.code==='ArrowRight'){e.preventDefault();nextSegment();}
});
</script>
</body>
</html>
